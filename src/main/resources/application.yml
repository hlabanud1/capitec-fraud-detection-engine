spring:
  application:
    name: fraud-detection-engine

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:frauddb}
    username: ${DB_USER:frauduser}
    password: ${DB_PASSWORD:fraudpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Fraud Detection Configuration
fraud:
  rules:
    high-value-threshold: 50000.00
    velocity:
      max-transactions-per-hour: 10
      max-amount-per-hour: 100000.00
    unusual-time:
      start-hour: 2
      end-hour: 5
      significant-amount: 10000.00

logging:
  level:
    root: INFO
    za.co.capitec: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method