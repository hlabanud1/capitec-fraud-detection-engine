services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-detection-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frauddb}
      POSTGRES_USER: ${POSTGRES_USER:-frauduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraudpass}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-frauduser} -d ${POSTGRES_DB:-frauddb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fraud-detection-network

  fraud-detection-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-detection-app
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-frauddb}
      DB_USER: ${DB_USER:-frauduser}
      DB_PASSWORD: ${DB_PASSWORD:-fraudpass}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/transactions/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fraud-detection-network

volumes:
  postgres_data:

networks:
  fraud-detection-network:
    driver: bridge